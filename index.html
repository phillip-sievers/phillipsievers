<!doctype html>
<html lang="en" data-font="martian" data-paginate>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Phillip Sievers</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Poiret+One&display=swap"
            rel="stylesheet" />
        <link rel="stylesheet" href="assets/site.css" />
    </head>
    <body>
        <canvas id="illum"></canvas>

        <header class="site-head unselectable">
            <a href="index.html" class="crumb">Phillip Sievers</a>
        </header>

        <main>
            <section id="landing" data-pane>
                <div class="theme-hint" id="theme-hint" data-no-toggle>
                    <span class="dot-tag"></span>
                    <span class="hint-text"
                        >double-click anywhere to switch theme</span
                    >
                    <button
                        class="hint-close"
                        data-no-toggle
                        aria-label="Dismiss">
                        ×
                    </button>
                </div>
                <nav class="landing-nav">
                    <a
                        class="unselectable"
                        href="https://www.linkedin.com/in/phillip-sievers/"
                        target="_blank"
                        rel="noopener"
                        >linkedin</a
                    >
                    <a
                        class="unselectable"
                        href="https://github.com/phillip-sievers"
                        target="_blank"
                        rel="noopener"
                        >github</a
                    >
                    <a
                        class="unselectable"
                        href="/Phillip_Sievers_Resume.pdf"
                        target="_blank"
                        rel="noopener"
                        >resume</a
                    >
                    <a class="unselectable" href="blog.html">writing</a>
                </nav>

                <button
                    id="down-trigger"
                    aria-label="Scroll down"
                    data-goto="1">
                    <svg
                        width="24"
                        height="24"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        class="bounce">
                        <path d="m6 9 6 6 6-6"></path>
                    </svg>
                </button>
            </section>

            <section id="blog" data-pane>
                <div class="blog-wrap">
                    <div class="sect-title">
                        <span class="bar"></span>
                        <span>Writing</span>
                        <span class="count" id="post-count"></span>
                    </div>

                    <ul class="post-list" id="post-list"></ul>

                    <div class="blog-footer">
                        <span class="meta"
                            >notes on ml, books, and stuff and things and
                            such.</span
                        >
                        <a href="blog.html"
                            >all posts <span class="arrow">→</span></a
                        >
                    </div>
                </div>
            </section>
        </main>

        <script src="assets/illum.js"></script>
        <script src="assets/posts.js"></script>
        <script src="assets/site.js"></script>
        <script>
            Site.renderList("#post-list", { limit: 3 });
            document.getElementById("post-count").textContent = window.POSTS
                .length
                ? String(window.POSTS.length).padStart(2, "0")
                : "— —";
        </script>
    </body>
</html>
